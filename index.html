<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamma Exposure | Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/highcharts@12.5.0/highcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highcharts@12.5.0/modules/exporting.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highcharts@12.5.0/modules/accessibility.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highcharts@12.5.0/highcharts-more.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highcharts@12.5.0/modules/heatmap.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/highcharts@12.5.0/modules/boost.js"></script> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f111a;
            --bg-card: rgba(30, 32, 47, 0.7);
            --bg-sidebar: #161826;
            --accent-primary: #8b5cf6;
            --accent-secondary: #f59e0b;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            --glass-bg: rgba(22, 24, 38, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            z-index: 100;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .sidebar.collapsed {
            width: 80px;
            padding: 24px 15px;
        }

        .sidebar.collapsed .sidebar-header-text,
        .sidebar.collapsed .sidebar-label,
        .sidebar.collapsed .control-group,
        .sidebar.collapsed .checkbox-group label,
        .sidebar.collapsed .sidebar-section>*:not(.sidebar-toggle) {
            display: none !important;
        }

        .sidebar.collapsed h1 {
            font-size: 16px;
            text-align: center;
        }

        .sidebar-toggle {
            position: absolute;
            top: 24px;
            right: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 110;
            transition: all 0.2s;
        }

        .sidebar.collapsed .sidebar-toggle {
            right: 28px;
        }

        .sidebar-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .sidebar h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 24px;
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        select,
        input[type="range"] {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--accent-primary);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-group input {
            cursor: pointer;
        }

        .playback-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .btn {
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .btn.active {
            background-color: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Main Content Styling */
        .main-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 10px;
        }

        .tab {
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--text-dim);
        }

        .tab.active {
            background-color: var(--bg-sidebar);
            color: var(--text-main);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-dim);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            flex: 1;
        }

        /* --- Responsive Design --- */
        @media (max-width: 1200px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow-y: auto;
            }

            .sidebar {
                width: 100% !important;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 16px;
                position: relative;
            }

            .sidebar.collapsed {
                height: 60px;
                overflow: hidden;
            }

            .sidebar-toggle {
                transform: rotate(90deg);
                top: 16px;
            }

            .sidebar.collapsed .sidebar-toggle {
                transform: rotate(-90deg);
            }

            .main-content {
                padding: 16px;
                height: auto;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .chart-wrapper {
                min-height: 400px;
            }
        }

        .side-legend {
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid var(--glass-border);
            padding: 12px 20px;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 24px;
            border-radius: 0 0 20px 20px;
            flex-wrap: wrap;
            margin: 0 -20px;
        }

        .chart-wrapper {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px 20px 0 20px;
            min-height: 550px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .side-legend-title {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-right: -8px;
        }

        .side-legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-main);
        }

        .marker-icon {
            color: #94a3b8;
            font-size: 14px;
            width: 16px;
            text-align: center;
        }

        .chart-container {
            flex: 1;
            width: 100%;
        }

        .hidden {
            display: none;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #rewind-slider-label {
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .metric-toggles {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .metric-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            padding: 6px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .metric-btn.active {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--accent-primary);
            color: var(--text-main);
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-deep);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Connection Status States */
        .status-reconnecting {
            color: var(--accent-secondary) !important;
            animation: pulse-status 1.5s infinite;
        }

        .status-error {
            color: #ef4444 !important;
            animation: pulse-status 1s infinite;
        }

        @keyframes pulse-status {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        /* --- Notifications Panel --- */
        .notification-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px;
        }

        .notification-item {
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            border-left: 4px solid #ccc;
            background: rgba(255, 255, 255, 0.04);
            transition: transform 0.2s, background 0.2s;
            cursor: default;
        }

        .notification-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-1px);
        }

        .notification-item.gamma_flip {
            border-left-color: var(--accent-primary);
        }

        .notification-item.zscore {
            border-left-color: var(--accent-secondary);
        }

        .notif-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .notif-type {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
        }

        .notif-time {
            font-size: 10px;
            color: var(--text-dim);
        }

        .notif-body {
            line-height: 1.4;
            white-space: pre-wrap;
            color: var(--text-main);
        }

        .empty-notifications {
            padding: 20px;
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>Initializing Analytics...</p>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header" style="position: relative;">
            <button class="sidebar-toggle" id="sidebar-toggle">◀</button>
            <div class="sidebar-header-text">
                <h1>GAMMA FLOW</h1>
                <p style="font-size: 13px; color: var(--text-dim);">Dealer Exposure Analytics</p>
            </div>
        </div>

        <div class="sidebar-section">
            <label class="sidebar-label">Asset</label>
            <div class="control-group">
                <select id="ticker-select">
                    <option value="QQQ">QQQ</option>
                    <option value="SPY">SPY</option>
                </select>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="checkbox-group" id="rewind-toggle-wrap">
                <input type="checkbox" id="rewind-checkbox">
                <label for="rewind-checkbox">Enable Rewind</label>
            </div>
            <div id="date-select-wrap" class="control-group hidden">
                <label class="sidebar-label">Select Date</label>
                <select id="date-select"></select>
            </div>
        </div>

        <div id="rewind-controls" class="sidebar-section hidden">
            <label class="sidebar-label">Replay Controls</label>
            <div class="playback-controls">
                <button class="btn" id="btn-back">⏪</button>
                <button class="btn" id="btn-play">▶️</button>
                <button class="btn" id="btn-forward">⏩</button>
            </div>
            <div class="control-group">
                <div class="slider-header">
                    <label class="sidebar-label">Snapshot</label>
                    <span id="rewind-slider-label">00:00:00</span>
                </div>
                <input type="range" id="rewind-slider" min="0" max="100" value="0">
            </div>
        </div>

        <div class="sidebar-section">
            <label class="sidebar-label">Configuration</label>
            <div class="control-group">
                <label class="sidebar-label" style="font-size: 10px;">Timeframe</label>
                <select id="timeframe-select">
                    <option value="15">Last 15 Minutes</option>
                    <option value="30">Last 30 Minutes</option>
                    <option value="60">Last 1 Hour</option>
                    <option value="240">Last 4 Hours</option>
                    <option value="all" selected>Full Day</option>
                </select>
            </div>
            <div class="control-group">
                <label class="sidebar-label" style="font-size: 10px;">Strike Count: <span
                        id="strike-count-val">10</span></label>
                <input type="range" id="strike-slider" min="1" max="50" value="10">
            </div>
            <div class="checkbox-group" style="margin-top: 8px;">
                <input type="checkbox" id="heatmap-norm-checkbox" checked>
                <label for="heatmap-norm-checkbox" style="font-size: 12px; color: var(--text-dim);">Normalized
                    Heatmap</label>
            </div>
        </div>

        <div class="sidebar-section">
            <label class="sidebar-label">Recent Alerts</label>
            <div id="notification-panel" class="notification-panel">
                <div class="empty-notifications">Waiting for signals...</div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <nav class="top-nav">
            <div class="tabs">
                <div class="tab active" data-tab="spot">📊 Spot Analysis</div>
                <div class="tab" data-tab="historical">📈 Historical Flow</div>
            </div>
            <div id="last-updated" style="font-size: 12px; color: var(--text-dim);">
                Last Live Sync: <span id="sync-time">--:--:--</span>
            </div>
        </nav>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Current Price</span>
                <span class="stat-value" id="stat-price">$0.00</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Max Gamma Strike</span>
                <span class="stat-value" id="stat-max-gamma">$0.00</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Total Delta Exposure</span>
                <span class="stat-value" id="stat-total-delta">$0.00</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Ticker</span>
                <span class="stat-value" id="stat-ticker">---</span>
            </div>
        </div>

        <!-- Spot Analysis View -->
        <div id="view-spot" class="charts-grid">
            <div class="chart-wrapper">
                <div id="chart-spot-gamma" class="chart-container"></div>
                <div class="side-legend" id="legend-gamma"></div>
            </div>
            <div class="chart-wrapper">
                <div id="chart-spot-delta" class="chart-container"></div>
                <div class="side-legend" id="legend-delta"></div>
            </div>
            <!-- <div class="chart-wrapper">
                <div id="chart-spot-charm" class="chart-container"></div>
                <div class="side-legend" id="legend-charm"></div>
            </div> -->

        </div>

        <!-- Historical View -->
        <div id="view-historical" class="charts-grid hidden">
            <div class="chart-wrapper" style="grid-column: 1 / -1; min-height: 500px;">
                <div id="chart-hist-heatmap" class="chart-container"></div>
            </div>
            <div class="chart-wrapper">
                <div id="chart-hist-gamma" class="chart-container"></div>
            </div>
            <div class="chart-wrapper">
                <div id="chart-hist-delta" class="chart-container"></div>
            </div>
            <!-- <div class="chart-wrapper">
                <div id="chart-hist-charm" class="chart-container"></div>
            </div> -->
            <div class="chart-wrapper" style="grid-column: 1 / -1; min-height: 500px;">
                <div id="chart-hist-charm-heatmap" class="chart-container"></div>
            </div>
        </div>
    </main>

    <script>
        // --- State Management ---
        const state = {
            tickers: [],
            availableDates: [],
            selectedTicker: 'QQQ',
            selectedDate: null,
            isRewind: false,
            isPlaying: false,
            rewindIdx: -1,
            timeframe: 'all',
            strikeCount: 10,
            normalizedHeatmap: true,
            activeIntervals: [1, 5, 10, 15, 30],

            // Historical data storage — Map<timestamp, rows[]> for O(1) lookups
            snapshotMap: new Map(),
            uniqueTimestamps: [], // Sorted keys derived from snapshotMap

            liveSnapshotByStrike: new Map(),

            // Metrics to show
            gammaMetrics: ['dealer_gamma_oi', 'dealer_gamma_vol', 'call_gamma_vol', 'put_gamma_vol'],
            deltaMetrics: ['dealer_delta_oi', 'dealer_delta_vol', 'call_delta_vol', 'put_delta_vol'],
            charmMetrics: ['dealer_charm_oi', 'dealer_charm_vol', 'call_charm_vol', 'put_charm_vol'],

            activeTab: 'spot',
            currentPrice: 0,
            charts: {},
            notifications: [],
            pendingRefreshTimer: null,
            pendingRefreshStats: false,
            pendingRefreshNotifications: false,
            pendingRefreshTick: false,
            historicalPointsCache: new Map()
        };

        // Load persisted metrics from localStorage
        try {
            const savedGamma = localStorage.getItem('gammaMetrics');
            const savedDelta = localStorage.getItem('deltaMetrics');
            const savedCharm = localStorage.getItem('charmMetrics');
            const savedIntervals = localStorage.getItem('activeIntervals');
            const savedTab = localStorage.getItem('activeTab');
            const savedStrikeCount = localStorage.getItem('strikeCount');
            const savedNorm = localStorage.getItem('normalizedHeatmap');

            if (savedGamma) state.gammaMetrics = JSON.parse(savedGamma);
            if (savedDelta) state.deltaMetrics = JSON.parse(savedDelta);
            if (savedCharm) state.charmMetrics = JSON.parse(savedCharm);
            if (savedIntervals) state.activeIntervals = JSON.parse(savedIntervals);
            if (savedTab) state.activeTab = savedTab;
            if (savedStrikeCount) state.strikeCount = parseInt(savedStrikeCount);
            if (savedNorm) state.normalizedHeatmap = savedNorm === 'true';

            // Sync UI
            if (state.strikeCount) {
                const slider = document.getElementById('strike-slider');
                if (slider) slider.value = state.strikeCount;
                const valDisp = document.getElementById('strike-count-val');
                if (valDisp) valDisp.textContent = state.strikeCount;
            }
            if (state.normalizedHeatmap !== undefined) {
                const cb = document.getElementById('heatmap-norm-checkbox');
                if (cb) cb.checked = state.normalizedHeatmap;
            }
        } catch (e) {
            console.warn("Failed to load metrics from localStorage", e);
        }

        function saveMetricsState() {
            try {
                localStorage.setItem('gammaMetrics', JSON.stringify(state.gammaMetrics));
                localStorage.setItem('deltaMetrics', JSON.stringify(state.deltaMetrics));
                localStorage.setItem('charmMetrics', JSON.stringify(state.charmMetrics));
                localStorage.setItem('activeIntervals', JSON.stringify(state.activeIntervals));
                localStorage.setItem('activeTab', state.activeTab);
                localStorage.setItem('strikeCount', state.strikeCount);
                localStorage.setItem('normalizedHeatmap', state.normalizedHeatmap);
            } catch (e) {
                console.warn("Failed to save metrics to localStorage", e);
            }
        }

        const metricLabels = {
            'dealer_gamma_oi': 'Open Interest',
            'dealer_gamma_vol': 'Net Volume',
            'call_gamma_vol': 'Call Vol',
            'put_gamma_vol': 'Put Vol',
            'naive_gamma': 'Naive Gamma',
            'dealer_delta_oi': 'Open Interest',
            'dealer_delta_vol': 'Net Volume',
            'call_delta_vol': 'Call Vol',
            'put_delta_vol': 'Put Vol',
            'dealer_charm_oi': 'Open Interest',
            'dealer_charm_vol': 'Net Volume',
            'call_charm_vol': 'Call Vol',
            'put_charm_vol': 'Put Vol'
        };

        const colors = {
            purple: '#8b5cf6',
            gold: '#f59e0b',
            blue: '#3b82f6',
            red: '#ef4444',
            green: '#10b981'
        };

        const metricColors = {
            'dealer_gamma_oi': colors.purple,
            'dealer_gamma_vol': colors.gold,
            'call_gamma_vol': colors.green,
            'put_gamma_vol': colors.red,
            'naive_gamma': colors.blue,
            'dealer_delta_oi': colors.purple,
            'dealer_delta_vol': colors.gold,
            'call_delta_vol': colors.green,
            'put_delta_vol': colors.red,
            'dealer_charm_oi': colors.purple,
            'dealer_charm_vol': colors.gold,
            'call_charm_vol': colors.green,
            'put_charm_vol': colors.red
        };

        // --- Highcharts Theme ---
        Highcharts.setOptions({
            time: {
                timezone: 'America/New_York'
            },
            chart: {
                backgroundColor: 'transparent',
                animation: false,
                style: {
                    fontFamily: 'Inter, sans-serif'

            },
